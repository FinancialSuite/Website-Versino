<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" preserveAspectRatio="xMidYMid meet" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ED731B"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#003862"/>
    </marker>
    <marker id="arrow-grey" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#888"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#003862">VPS Financial Suite — Module Overview &amp; Data Flows</text>
  <text x="600" y="60" text-anchor="middle" font-size="12" fill="#666">How the 11 modules work together — from configuration through posting to analysis</text>

  <!-- ===== Layer 1: Foundation ===== -->
  <rect x="40" y="85" width="1120" height="140" fill="#f0f6fc" stroke="#b8d4ea" stroke-width="1.5" rx="8"/>
  <text x="55" y="108" font-size="12" font-weight="bold" fill="#003862" letter-spacing="1">FOUNDATION &amp; CONFIGURATION</text>

  <!-- Financial Suite (Main Module) -->
  <rect x="320" y="125" width="260" height="80" rx="8" fill="#003862" filter="url(#shadow)"/>
  <text x="450" y="155" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">Financial Suite</text>
  <text x="450" y="173" text-anchor="middle" fill="#ffffff" font-size="11">Main Module · Wizard · Netting</text>
  <text x="450" y="192" text-anchor="middle" fill="#ED731B" font-size="11" font-style="italic">Client · Chart of accounts · Tax</text>

  <!-- JE Text Setter -->
  <rect x="620" y="125" width="260" height="80" rx="8" fill="#003862" filter="url(#shadow)"/>
  <text x="750" y="155" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">Posting Text Configurator</text>
  <text x="750" y="173" text-anchor="middle" fill="#ffffff" font-size="11">JE Text Setter</text>
  <text x="750" y="192" text-anchor="middle" fill="#ED731B" font-size="11" font-style="italic">Uniform posting texts</text>

  <!-- ===== Layer 2: Data Entry ===== -->
  <rect x="40" y="265" width="1120" height="170" fill="#fff7f0" stroke="#ffd9b8" stroke-width="1.5" rx="8"/>
  <text x="55" y="288" font-size="12" font-weight="bold" fill="#ED731B" letter-spacing="1">DATA ENTRY &amp; POSTING CREATION</text>

  <!-- Exchange Rates -->
  <rect x="60" y="305" width="240" height="110" rx="8" fill="#ffffff" stroke="#003862" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="332" text-anchor="middle" fill="#003862" font-size="14" font-weight="bold">Exchange Rates Import</text>
  <text x="180" y="354" text-anchor="middle" fill="#666" font-size="11">ECB · NBP</text>
  <text x="180" y="380" text-anchor="middle" fill="#888" font-size="10">Daily rates for</text>
  <text x="180" y="395" text-anchor="middle" fill="#888" font-size="10">foreign-currency postings</text>

  <!-- Bank Import -->
  <rect x="320" y="305" width="240" height="110" rx="8" fill="#ffffff" stroke="#003862" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="332" text-anchor="middle" fill="#003862" font-size="14" font-weight="bold">Bank Statement Import</text>
  <text x="440" y="354" text-anchor="middle" fill="#666" font-size="11">MT940 · CAMT · RegEx engine</text>
  <text x="440" y="380" text-anchor="middle" fill="#888" font-size="10">Auto-assignment</text>
  <text x="440" y="395" text-anchor="middle" fill="#888" font-size="10">→ Bank postings</text>

  <!-- Fast Entry -->
  <rect x="580" y="305" width="240" height="110" rx="8" fill="#ffffff" stroke="#003862" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="332" text-anchor="middle" fill="#003862" font-size="14" font-weight="bold">Fast Entry</text>
  <text x="700" y="354" text-anchor="middle" fill="#666" font-size="11">A/P invoices</text>
  <text x="700" y="380" text-anchor="middle" fill="#888" font-size="10">From templates / favorites</text>
  <text x="700" y="395" text-anchor="middle" fill="#888" font-size="10">→ A/P documents</text>

  <!-- Pro-Rata -->
  <rect x="840" y="305" width="240" height="110" rx="8" fill="#ffffff" stroke="#003862" stroke-width="2" filter="url(#shadow)"/>
  <text x="960" y="332" text-anchor="middle" fill="#003862" font-size="14" font-weight="bold">Period Accrual/Deferral</text>
  <text x="960" y="354" text-anchor="middle" fill="#666" font-size="11">Pro-Rata</text>
  <text x="960" y="380" text-anchor="middle" fill="#888" font-size="10">Day-precise distribution</text>
  <text x="960" y="395" text-anchor="middle" fill="#888" font-size="10">→ Accrual postings</text>

  <!-- ===== Layer 3: SAP B1 Core ===== -->
  <rect x="40" y="475" width="1120" height="60" fill="#003862" rx="8" filter="url(#shadow)"/>
  <text x="600" y="500" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">SAP Business One — Journal Entries, Master Data, Documents</text>
  <text x="600" y="520" text-anchor="middle" fill="#ED731B" font-size="11" font-style="italic">All modules write to the same database</text>

  <!-- ===== Layer 4: DATEV Interfaces ===== -->
  <rect x="40" y="575" width="650" height="170" fill="#f0f6fc" stroke="#b8d4ea" stroke-width="1.5" rx="8"/>
  <text x="55" y="598" font-size="12" font-weight="bold" fill="#003862" letter-spacing="1">DATEV INTERFACES</text>

  <!-- DATEV Export -->
  <rect x="80" y="615" width="280" height="110" rx="8" fill="#ffffff" stroke="#003862" stroke-width="2" filter="url(#shadow)"/>
  <text x="220" y="643" text-anchor="middle" fill="#003862" font-size="14" font-weight="bold">DATEV Export</text>
  <text x="220" y="665" text-anchor="middle" fill="#666" font-size="11">EXTF CSV files</text>
  <text x="220" y="690" text-anchor="middle" fill="#888" font-size="10">Status: Y/N/E/F</text>
  <text x="220" y="705" text-anchor="middle" fill="#888" font-size="10">→ to tax advisor</text>

  <!-- DATEV Import -->
  <rect x="380" y="615" width="280" height="110" rx="8" fill="#ffffff" stroke="#003862" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="643" text-anchor="middle" fill="#003862" font-size="14" font-weight="bold">DATEV Import</text>
  <text x="520" y="665" text-anchor="middle" fill="#666" font-size="11">CSV → Pre-entry / JE</text>
  <text x="520" y="690" text-anchor="middle" fill="#888" font-size="10">116 DATEV fields</text>
  <text x="520" y="705" text-anchor="middle" fill="#888" font-size="10">back from tax advisor</text>

  <!-- ===== Layer 5: Analysis ===== -->
  <rect x="710" y="575" width="450" height="170" fill="#fff7f0" stroke="#ffd9b8" stroke-width="1.5" rx="8"/>
  <text x="725" y="598" font-size="12" font-weight="bold" fill="#ED731B" letter-spacing="1">ANALYSIS &amp; DASHBOARD</text>

  <!-- Reporting -->
  <rect x="735" y="615" width="200" height="110" rx="8" fill="#ffffff" stroke="#003862" stroke-width="2" filter="url(#shadow)"/>
  <text x="835" y="643" text-anchor="middle" fill="#003862" font-size="14" font-weight="bold">Reports</text>
  <text x="835" y="665" text-anchor="middle" fill="#666" font-size="11">Crystal Reports</text>
  <text x="835" y="690" text-anchor="middle" fill="#888" font-size="10">BWA · TB · OPK</text>
  <text x="835" y="705" text-anchor="middle" fill="#888" font-size="10">Balance confirmation, etc.</text>

  <!-- Cockpit -->
  <rect x="950" y="615" width="200" height="110" rx="8" fill="#ffffff" stroke="#003862" stroke-width="2" filter="url(#shadow)"/>
  <text x="1050" y="643" text-anchor="middle" fill="#003862" font-size="14" font-weight="bold">Cockpit</text>
  <text x="1050" y="665" text-anchor="middle" fill="#666" font-size="11">Dashboard · Posting Batch</text>
  <text x="1050" y="690" text-anchor="middle" fill="#888" font-size="10">Multi-company login</text>
  <text x="1050" y="705" text-anchor="middle" fill="#888" font-size="10">Consolidates all modules</text>

  <!-- ===== Layer 6: UI Tool (Toolbox) ===== -->
  <rect x="40" y="775" width="1120" height="80" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5" stroke-dasharray="6,3" rx="8"/>
  <text x="55" y="795" font-size="12" font-weight="bold" fill="#666" letter-spacing="1">UI TOOL (active in all SAP B1 forms)</text>
  <rect x="450" y="805" width="300" height="40" rx="8" fill="#ffffff" stroke="#003862" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="830" text-anchor="middle" fill="#003862" font-size="13" font-weight="bold">Toolbox</text>

  <!-- ===== Arrows (Data Flows) ===== -->
  <!-- Main Module → all posting modules (dashed = configuration) -->
  <path d="M 450 210 L 450 240 L 180 240 L 180 300" fill="none" stroke="#003862" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M 450 240 L 440 240 L 440 300" fill="none" stroke="#003862" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M 450 240 L 700 240 L 700 300" fill="none" stroke="#003862" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M 450 240 L 960 240 L 960 300" fill="none" stroke="#003862" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>

  <!-- JE Text Setter → Pro-Rata, FastEntry (dashed = provides texts) -->
  <path d="M 750 210 L 750 250 L 700 250 L 700 300" fill="none" stroke="#ED731B" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-orange)"/>
  <path d="M 750 250 L 960 250 L 960 300" fill="none" stroke="#ED731B" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-orange)"/>

  <!-- Posting modules → SAP B1 (solid = data) -->
  <path d="M 180 420 L 180 470" fill="none" stroke="#ED731B" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <path d="M 440 420 L 440 470" fill="none" stroke="#ED731B" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <path d="M 700 420 L 700 470" fill="none" stroke="#ED731B" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <path d="M 960 420 L 960 470" fill="none" stroke="#ED731B" stroke-width="2.5" marker-end="url(#arrow-orange)"/>

  <!-- SAP B1 → DATEV Export -->
  <path d="M 220 540 L 220 610" fill="none" stroke="#ED731B" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <!-- DATEV Import → SAP B1 -->
  <path d="M 520 610 L 520 540" fill="none" stroke="#ED731B" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <!-- SAP B1 → Reports -->
  <path d="M 835 540 L 835 610" fill="none" stroke="#ED731B" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <!-- SAP B1 → Cockpit -->
  <path d="M 1050 540 L 1050 610" fill="none" stroke="#ED731B" stroke-width="2.5" marker-end="url(#arrow-orange)"/>

  <!-- DATEV Export ↔ DATEV Import (tax advisor loop) -->
  <path d="M 360 660 L 380 660" fill="none" stroke="#003862" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 380 685 L 360 685" fill="none" stroke="#003862" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Reports → Cockpit -->
  <path d="M 935 670 L 950 670" fill="none" stroke="#003862" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Toolbox → SAP B1 (dashed = UI helper) -->
  <path d="M 600 805 L 600 540" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)"/>

  <!-- ===== Legend ===== -->
  <g transform="translate(60, 760)">
    <line x1="0" y1="-5" x2="25" y2="-5" stroke="#ED731B" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
    <text x="32" y="-1" font-size="10" fill="#666">Data flow (postings)</text>

    <line x1="170" y1="-5" x2="195" y2="-5" stroke="#003862" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
    <text x="202" y="-1" font-size="10" fill="#666">Configuration / master data</text>

    <line x1="370" y1="-5" x2="395" y2="-5" stroke="#ED731B" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-orange)"/>
    <text x="402" y="-1" font-size="10" fill="#666">Provides texts</text>

    <line x1="490" y1="-5" x2="515" y2="-5" stroke="#888" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)"/>
    <text x="522" y="-1" font-size="10" fill="#666">UI extension</text>
  </g>
</svg>
